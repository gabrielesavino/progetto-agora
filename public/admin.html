<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agorà — Pannello Amministrazione</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .costruzione {
      max-width: 480px;
      padding: 3rem 2rem;
    }
    .costruzione .simbolo {
      font-size: 3rem;
      display: block;
      margin-bottom: 1.5rem;
    }
    .costruzione h1 {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }
    .costruzione p {
      font-size: 0.9rem;
      color: var(--colore-testo-leggero);
      line-height: 1.7;
    }
    .fase-badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 4px 14px;
      background: rgba(194,65,12,0.1);
      color: var(--colore-terracotta);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
    }
    .btn-logout {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 1.5rem;
      background: none;
      border: 1px solid var(--colore-bordo);
      border-radius: 3px;
      font-family: var(--font-body);
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--colore-testo-leggero);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      border-color: var(--colore-testo);
      color: var(--colore-testo);
    }
    .info-utente {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--colore-testo-leggero);
    }
    .info-utente strong {
      color: var(--colore-testo);
    }
  </style>
</head>
<body>
  <div class="costruzione">
    <span class="simbolo">⚙️</span>
    <h1>Pannello IAM</h1>
    <p>
      Da qui potrai gestire gli utenti, modificare i ruoli e gli stati degli account,
      e consultare il log completo di tutti gli eventi di sistema.
    </p>
    <div class="fase-badge">In costruzione — Fase 3</div>
    <div class="info-utente" id="info-utente"></div>
    <br>
    <button class="btn-logout" onclick="logout()">← Esci</button>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Protezione: solo gli Admin possono accedere
    const utente = getUtenteSessione();
    if (!utente) {
      window.location.href = '/index.html';
    } else if (utente.ruolo !== 'Admin') {
      window.location.href = '/dashboard.html';
    } else {
      document.getElementById('info-utente').innerHTML =
        `Accesso come <strong>${utente.username}</strong> &mdash; Ruolo: <strong>${utente.ruolo}</strong>`;
    }

    function logout() {
      cancellaSessione();
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
